name: E2E Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  e2e-tests:
    name: E2E Tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        shard: [1/4, 2/4, 3/4, 4/4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci
        working-directory: ./web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: ./web

      - name: Cache Playwright binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Start frontend server
        run: |
          npm run build
          npm run preview -- --host 0.0.0.0 --port 3000 &
          echo $! > preview.pid
          # Wait for server to be ready
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
        working-directory: ./web

      - name: Run E2E tests
        run: npx playwright test --shard=${{ matrix.shard }} --reporter=json
        env:
          BASE_URL: http://localhost:3000
        working-directory: ./web
        continue-on-error: true

      - name: Stop frontend server
        if: always()
        run: |
          if [ -f preview.pid ]; then
            kill $(cat preview.pid) || true
          fi
        working-directory: ./web

      - name: Merge test results
        if: always()
        run: npx playwright merge-reports test-results/results-*.json
        continue-on-error: true
        working-directory: ./web

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.shard }}
          path: |
            web/playwright-report/
            web/test-results/
          retention-days: 30

  e2e-report:
    name: Generate E2E Report
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: playwright-reports

      - name: Merge reports
        run: |
          mkdir -p web/playwright-report
          # Copy all reports to web directory
          cp -r playwright-reports/playwright-report-*/* web/playwright-report/ || true
          cp -r playwright-reports/*/test-results/* web/test-results/ || true

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: html-report
          path: web/playwright-report/
          retention-days: 30

      - name: Report summary
        run: |
          echo "# E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "web/test-results/results.json" ]; then
            echo "Test results available in artifacts." >> $GITHUB_STEP_SUMMARY
          else
            echo "No merged results found." >> $GITHUB_STEP_SUMMARY
          fi

  e2e-smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci
        working-directory: ./web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: ./web

      - name: Run smoke tests
        run: npx playwright test e2e/tests/common/smoke.spec.ts --reporter=list
        env:
          BASE_URL: http://localhost:3000
        working-directory: ./web
        continue-on-error: true

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: |
            web/playwright-report/
            web/test-results/
          retention-days: 7
