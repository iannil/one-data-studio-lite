# ONE-DATA-STUDIO-LITE - Apache DolphinScheduler 部署
# 端口: 12345 (API & UI), 25333 (Master), 1234 (Worker)
# 参考: https://dolphinscheduler.apache.org/

services:
  dolphinscheduler-zookeeper:
    image: zookeeper:3.8
    container_name: ods-ds-zookeeper
    restart: unless-stopped
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "srvr,ruok,wchs,cons"
    volumes:
      - ds-zk-data:/data
    networks:
      - ods-network

  dolphinscheduler-postgres:
    image: postgres:15-alpine
    container_name: ods-ds-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dolphinscheduler
      POSTGRES_PASSWORD: ds2024
      POSTGRES_DB: dolphinscheduler
    volumes:
      - ds-pg-data:/var/lib/postgresql/data
    networks:
      - ods-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dolphinscheduler"]
      interval: 5s
      timeout: 3s
      retries: 5

  dolphinscheduler-schema-init:
    image: apache/dolphinscheduler-tools:3.2.1
    container_name: ods-ds-schema-init
    command: ["tools/bin/upgrade-schema.sh"]
    environment:
      DATABASE: postgresql
      SPRING_DATASOURCE_URL: "jdbc:postgresql://dolphinscheduler-postgres:5432/dolphinscheduler"
      SPRING_DATASOURCE_USERNAME: dolphinscheduler
      SPRING_DATASOURCE_PASSWORD: ds2024
    networks:
      - ods-network
    depends_on:
      dolphinscheduler-postgres:
        condition: service_healthy

  dolphinscheduler-api:
    image: apache/dolphinscheduler-api:3.2.1
    container_name: ods-ds-api
    restart: unless-stopped
    ports:
      - "12345:12345"
    environment: &ds-env
      DATABASE: postgresql
      SPRING_DATASOURCE_URL: "jdbc:postgresql://dolphinscheduler-postgres:5432/dolphinscheduler"
      SPRING_DATASOURCE_USERNAME: dolphinscheduler
      SPRING_DATASOURCE_PASSWORD: ds2024
      REGISTRY_ZOOKEEPER_CONNECT_STRING: dolphinscheduler-zookeeper:2181
      JAVA_OPTS: "-Xms512m -Xmx1g"
    volumes:
      - ds-logs:/opt/dolphinscheduler/logs
      - ds-resource:/opt/dolphinscheduler/resource
    networks:
      - ods-network
    depends_on:
      dolphinscheduler-schema-init:
        condition: service_completed_successfully
      dolphinscheduler-zookeeper:
        condition: service_started

  dolphinscheduler-master:
    image: apache/dolphinscheduler-master:3.2.1
    container_name: ods-ds-master
    restart: unless-stopped
    ports:
      - "25333:25333"
    environment: *ds-env
    volumes:
      - ds-logs:/opt/dolphinscheduler/logs
    networks:
      - ods-network
    depends_on:
      dolphinscheduler-schema-init:
        condition: service_completed_successfully

  dolphinscheduler-worker:
    image: apache/dolphinscheduler-worker:3.2.1
    container_name: ods-ds-worker
    restart: unless-stopped
    ports:
      - "1234:1234"
    environment:
      <<: *ds-env
      WORKER_GROUPS: "default,seatunnel,hop"
    volumes:
      - ds-logs:/opt/dolphinscheduler/logs
      - ds-resource:/opt/dolphinscheduler/resource
    networks:
      - ods-network
    depends_on:
      dolphinscheduler-schema-init:
        condition: service_completed_successfully

  dolphinscheduler-alert:
    image: apache/dolphinscheduler-alert-server:3.2.1
    container_name: ods-ds-alert
    restart: unless-stopped
    environment: *ds-env
    volumes:
      - ds-logs:/opt/dolphinscheduler/logs
    networks:
      - ods-network
    depends_on:
      dolphinscheduler-schema-init:
        condition: service_completed_successfully

volumes:
  ds-zk-data:
  ds-pg-data:
  ds-logs:
  ds-resource:

networks:
  ods-network:
    name: ods-network
    external: true
