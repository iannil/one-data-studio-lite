<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cube-Studio Lite - AI工作流</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 20px;
        }
        .features { margin: 30px 0; }
        .feature {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .feature:last-child { border-bottom: none; }
        .feature-icon {
            width: 32px;
            height: 32px;
            background: #f0f0f0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 16px;
        }
        .note {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px;
            margin-top: 20px;
            border-radius: 4px;
            font-size: 14px;
            color: #856404;
        }
        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border-radius: 6px;
            text-decoration: none;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .btn:hover { background: #5568d3; }
    </style>
</head>
<body>
    <div class="container">
        <span class="badge">测试环境</span>
        <h1>Cube-Studio Lite</h1>
        <p class="subtitle">AI 工作流编排与模型训练平台 (精简版)</p>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">🧠</div>
                <div>
                    <strong>模型训练</strong>
                    <div style="font-size: 13px; color: #666;">可视化模型训练流程</div>
                </div>
            </div>
            <div class="feature">
                <div class="feature-icon">📊</div>
                <div>
                    <strong>数据标注</strong>
                    <div style="font-size: 13px; color: #666;">智能数据标注工具</div>
                </div>
            </div>
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <div>
                    <strong>工作流编排</strong>
                    <div style="font-size: 13px; color: #666;">拖拽式工作流设计器</div>
                </div>
            </div>
        </div>

        <div class="note">
            <strong>注意:</strong> 这是测试环境的精简版本，仅包含前端演示。
            完整功能请使用完整版 Cube-Studio。
        </div>

        <a href="http://localhost:8010" class="btn">返回统一门户</a>
    </div>
</body>
</html>
