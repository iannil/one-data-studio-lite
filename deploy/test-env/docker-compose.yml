# ONE-DATA-STUDIO-LITE - 精简测试环境
# 资源优化: 内存 < 3GB, CPU < 1.2核
# 启动时间: < 5分钟 (首次需拉取镜像)

networks:
  test-env-network:
    driver: bridge
    name: test-env-network

volumes:
  mysql-data:
  minio-data:
  datahub-mysql-data:
  datahub-es-data:
  superset-db-data:
  superset-redis-data:
  superset-home:

services:
  # ==================== 基础设施 ====================

  mysql:
    image: mysql:8.0
    container_name: test-env-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --max-connections=500
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-test_root_password}
      MYSQL_DATABASE: one_data_studio
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-sql:/docker-entrypoint-initdb.d:ro
    networks:
      - test-env-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: test-env-redis
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - test-env-network
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  minio:
    image: minio/minio:latest
    container_name: test-env-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - test-env-network
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==================== DataHub (精简版) ====================

  datahub-mysql:
    image: mysql:8.0
    container_name: test-env-datahub-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: datahub2024
      MYSQL_DATABASE: datahub
    volumes:
      - datahub-mysql-data:/var/lib/mysql
    networks:
      - test-env-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  datahub-elasticsearch:
    image: elasticsearch:7.17.18
    container_name: test-env-datahub-es
    restart: unless-stopped
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms256m -Xmx256m"
      xpack.security.enabled: "false"
    volumes:
      - datahub-es-data:/usr/share/elasticsearch/data
    networks:
      - test-env-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  datahub-zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: test-env-datahub-zk
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - test-env-network
    deploy:
      resources:
        limits:
          memory: 128M

  datahub-kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: test-env-datahub-kafka
    restart: unless-stopped
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: datahub-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://datahub-kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx256m"
    networks:
      - test-env-network
    depends_on:
      - datahub-zookeeper
    deploy:
      resources:
        limits:
          memory: 512M

  datahub-schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: test-env-datahub-schema
    restart: unless-stopped
    environment:
      SCHEMA_REGISTRY_HOST_NAME: datahub-schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: datahub-kafka:9092
    networks:
      - test-env-network
    depends_on:
      - datahub-kafka
    deploy:
      resources:
        limits:
          memory: 256M

  datahub-mysql-setup:
    image: acryldata/datahub-mysql-setup:v0.13.2
    container_name: test-env-datahub-mysql-setup
    environment:
      MYSQL_HOST: datahub-mysql
      MYSQL_PORT: "3306"
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: datahub2024
      DATAHUB_DB_NAME: datahub
    networks:
      - test-env-network
    depends_on:
      datahub-mysql:
        condition: service_healthy

  datahub-elasticsearch-setup:
    image: acryldata/datahub-elasticsearch-setup:v0.13.2
    container_name: test-env-datahub-es-setup
    environment:
      ELASTICSEARCH_HOST: datahub-elasticsearch
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_PROTOCOL: http
    networks:
      - test-env-network
    depends_on:
      datahub-elasticsearch:
        condition: service_healthy

  datahub-kafka-setup:
    image: acryldata/datahub-kafka-setup:v0.13.2
    container_name: test-env-datahub-kafka-setup
    environment:
      KAFKA_BOOTSTRAP_SERVER: datahub-kafka:9092
      KAFKA_ZOOKEEPER_CONNECT: datahub-zookeeper:2181
      USE_CONFLUENT_SCHEMA_REGISTRY: "TRUE"
    networks:
      - test-env-network
    depends_on:
      - datahub-kafka
      - datahub-schema-registry

  datahub-gms:
    image: acryldata/datahub-gms:v0.13.2
    container_name: test-env-datahub-gms
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      DATAHUB_SERVER_TYPE: quickstart
      DATAHUB_GMS_HOST: datahub-gms
      DATAHUB_GMS_PORT: "8080"
      EBEAN_DATASOURCE_URL: "jdbc:mysql://datahub-mysql:3306/datahub?verifyServerCertificate=false&useSSL=false&useUnicode=yes&characterEncoding=UTF-8&allowPublicKeyRetrieval=true"
      EBEAN_DATASOURCE_HOST: datahub-mysql:3306
      EBEAN_DATASOURCE_USERNAME: root
      EBEAN_DATASOURCE_PASSWORD: datahub2024
      EBEAN_DATASOURCE_DRIVER: com.mysql.jdbc.Driver
      ELASTICSEARCH_HOST: datahub-elasticsearch
      ELASTICSEARCH_PORT: "9200"
      GRAPH_SERVICE_IMPL: elasticsearch
      KAFKA_BOOTSTRAP_SERVER: datahub-kafka:9092
      KAFKA_SCHEMAREGISTRY_URL: http://datahub-schema-registry:8081
      SKIP_NEO4J_CHECK: "true"
      ENTITY_REGISTRY_CONFIG_PATH: /datahub/datahub-gms/resources/entity-registry.yml
      ELASTICSEARCH_INDEX_BUILDER_ENABLED: "true"
      JAVA_OPTS: "-Xms256m -Xmx512m"
    networks:
      - test-env-network
    depends_on:
      datahub-mysql-setup:
        condition: service_completed_successfully
      datahub-elasticsearch-setup:
        condition: service_completed_successfully
      datahub-kafka-setup:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512M

  datahub-frontend:
    image: acryldata/datahub-frontend-react:v0.13.2
    container_name: test-env-datahub-frontend
    restart: unless-stopped
    ports:
      - "9002:9002"
    environment:
      DATAHUB_GMS_HOST: datahub-gms
      DATAHUB_GMS_PORT: "8080"
      DATAHUB_GMS_URL: "http://datahub-gms:8080"
      DATAHUB_SECRET: "YouKnowNothing"
      DATAHUB_APP_VERSION: "1.0"
      DATAHUB_PLAY_MEM_BUFFER_SIZE: "10MB"
      KAFKA_BOOTSTRAP_SERVER: datahub-kafka:9092
      ELASTIC_CLIENT_HOST: datahub-elasticsearch
      ELASTIC_CLIENT_PORT: "9200"
    networks:
      - test-env-network
    depends_on:
      - datahub-gms

  # ==================== Superset (精简版) ====================

  superset-db:
    image: postgres:15-alpine
    container_name: test-env-superset-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset2024
    volumes:
      - superset-db-data:/var/lib/postgresql/data
    networks:
      - test-env-network
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset"]
      interval: 5s
      timeout: 3s
      retries: 5

  superset-redis:
    image: redis:7-alpine
    container_name: test-env-superset-redis
    restart: unless-stopped
    command: redis-server --maxmemory 32mb --maxmemory-policy allkeys-lru
    networks:
      - test-env-network
    deploy:
      resources:
        limits:
          memory: 32M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  superset-init:
    image: apache/superset:3.1.0
    container_name: test-env-superset-init
    command: >
      bash -c "
        echo 'Initializing Superset...' &&
        superset db upgrade &&
        echo 'Creating admin user...' &&
        superset fab create-admin
          --username admin
          --firstname Admin
          --lastname User
          --email admin@onedata.local
          --password admin123 || true &&
        echo 'Initializing Superset...' &&
        superset init &&
        touch /app/superset_home/.initialized &&
        echo 'Superset initialization complete!'
      "
    environment: &superset-env
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset2024
      POSTGRES_HOST: superset-db
      POSTGRES_PORT: 5432
      SUPERSET_SECRET_KEY: test-env-superset-secret-key
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://superset:superset2024@superset-db:5432/superset
      REDIS_URL: redis://superset-redis:6379/0
      SUPERSET_LOAD_EXAMPLES: "no"
      SUPERSET_LOG_LEVEL: INFO
      SUPERSET_CSRF_ENABLED: "false"
    networks:
      - test-env-network
    depends_on:
      superset-db:
        condition: service_healthy
      superset-redis:
        condition: service_healthy

  superset:
    image: apache/superset:3.1.0
    container_name: test-env-superset
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment: *superset-env
    volumes:
      - superset-home:/app/superset_home
    networks:
      - test-env-network
    depends_on:
      superset-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==================== Cube-Studio Lite (精简版) ====================
  # 仅保留 UI 和 API，无 K8s 集成

  cube-studio-lite:
    image: nginx:alpine
    container_name: test-env-cube-studio-lite
    restart: unless-stopped
    ports:
      - "30100:80"
    volumes:
      - ./cube-studio-lite:/usr/share/nginx/html:ro
    networks:
      - test-env-network
    deploy:
      resources:
        limits:
          memory: 64M

  # ==================== 二开微服务 ====================

  portal:
    build:
      context: ../..
      dockerfile: services/Dockerfile
    container_name: test-env-portal
    restart: unless-stopped
    ports:
      - "8010:8010"
    environment:
      DATABASE_URL: mysql+aiomysql://root:test_root_password@mysql:3306/one_data_studio
      JWT_SECRET: test-env-jwt-secret-change-in-production
      LLM_BASE_URL: ${LLM_API_BASE:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-3.5-turbo}
      DATAHUB_GMS_URL: http://datahub-gms:8080
      DATAHUB_TOKEN: ""
      SUPERSET_URL: http://superset:8088
      CUBE_STUDIO_URL: http://cube-studio-lite
      PORTAL_SUPERSET_URL: http://superset:8088
      PORTAL_DATAHUB_URL: http://datahub-frontend:9002
      PORTAL_DATAHUB_GMS_URL: http://datahub-gms:8080
      PORTAL_NL2SQL_URL: http://nl2sql:8011
      PORTAL_AI_CLEANING_URL: http://ai-cleaning:8012
      PORTAL_METADATA_SYNC_URL: http://metadata-sync:8013
      PORTAL_DATA_API_URL: http://data-api:8014
      PORTAL_SENSITIVE_DETECT_URL: http://sensitive-detect:8015
      PORTAL_AUDIT_LOG_URL: http://audit-log:8016
    command: uvicorn services.portal.main:app --host 0.0.0.0 --port 8010
    networks:
      - test-env-network
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  nl2sql:
    build:
      context: ../..
      dockerfile: services/Dockerfile
    container_name: test-env-nl2sql
    restart: unless-stopped
    ports:
      - "8011:8011"
    environment:
      DATABASE_URL: mysql+aiomysql://root:test_root_password@mysql:3306/one_data_studio
      JWT_SECRET: test-env-jwt-secret-change-in-production
      LLM_BASE_URL: ${LLM_API_BASE:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-3.5-turbo}
      SUPERSET_URL: http://superset:8088
      DATAHUB_GMS_URL: http://datahub-gms:8080
    command: uvicorn services.nl2sql.main:app --host 0.0.0.0 --port 8011
    networks:
      - test-env-network
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  ai-cleaning:
    build:
      context: ../..
      dockerfile: services/Dockerfile
    container_name: test-env-ai-cleaning
    restart: unless-stopped
    ports:
      - "8012:8012"
    environment:
      DATABASE_URL: mysql+aiomysql://root:test_root_password@mysql:3306/one_data_studio
      JWT_SECRET: test-env-jwt-secret-change-in-production
      LLM_BASE_URL: ${LLM_API_BASE:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-3.5-turbo}
    command: uvicorn services.ai_cleaning.main:app --host 0.0.0.0 --port 8012
    networks:
      - test-env-network
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  metadata-sync:
    build:
      context: ../..
      dockerfile: services/Dockerfile
    container_name: test-env-metadata-sync
    restart: unless-stopped
    ports:
      - "8013:8013"
    environment:
      DATABASE_URL: mysql+aiomysql://root:test_root_password@mysql:3306/one_data_studio
      JWT_SECRET: test-env-jwt-secret-change-in-production
      DATAHUB_GMS_URL: http://datahub-gms:8080
      DATAHUB_TOKEN: ""
    command: uvicorn services.metadata_sync.main:app --host 0.0.0.0 --port 8013
    networks:
      - test-env-network
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  data-api:
    build:
      context: ../..
      dockerfile: services/Dockerfile
    container_name: test-env-data-api
    restart: unless-stopped
    ports:
      - "8014:8014"
    environment:
      DATABASE_URL: mysql+aiomysql://root:test_root_password@mysql:3306/one_data_studio
      JWT_SECRET: test-env-jwt-secret-change-in-production
      DATAHUB_GMS_URL: http://datahub-gms:8080
      DATAHUB_TOKEN: ""
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: uvicorn services.data_api.main:app --host 0.0.0.0 --port 8014
    networks:
      - test-env-network
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  sensitive-detect:
    build:
      context: ../..
      dockerfile: services/Dockerfile
    container_name: test-env-sensitive-detect
    restart: unless-stopped
    ports:
      - "8015:8015"
    environment:
      DATABASE_URL: mysql+aiomysql://root:test_root_password@mysql:3306/one_data_studio
      JWT_SECRET: test-env-jwt-secret-change-in-production
    command: uvicorn services.sensitive_detect.main:app --host 0.0.0.0 --port 8015
    networks:
      - test-env-network
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  audit-log:
    build:
      context: ../..
      dockerfile: services/Dockerfile
    container_name: test-env-audit-log
    restart: unless-stopped
    ports:
      - "8016:8016"
    environment:
      DATABASE_URL: mysql+aiomysql://root:test_root_password@mysql:3306/one_data_studio
      JWT_SECRET: test-env-jwt-secret-change-in-production
    command: uvicorn services.audit_log.main:app --host 0.0.0.0 --port 8016
    networks:
      - test-env-network
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
