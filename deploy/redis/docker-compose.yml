# ONE-DATA-STUDIO-LITE Redis 缓存
# 用于会话存储、缓存、消息队列

services:
  redis:
    image: redis:7-alpine
    container_name: ods-redis
    restart: unless-stopped
    command: >
      sh -c 'redis-server --requirepass ${REDIS_PASSWORD:-redis123} --appendonly yes'
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ods-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

volumes:
  redis_data:
    driver: local
    name: ods-redis-data

networks:
  ods-network:
    name: ods-network
    external: true
