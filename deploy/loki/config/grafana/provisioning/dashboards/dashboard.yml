# ONE-DATA-STUDIO-LITE - Grafana 仪表板配置
# 位置: deploy/loki/config/grafana/provisioning/dashboards/dashboard.yml

apiVersion: 1

providers:
  - name: 'OneDataStudioLite'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      folder: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
