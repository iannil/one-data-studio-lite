# ONE-DATA-STUDIO-LITE - Apache Hop 部署
# 端口: 8083 (Hop Web UI)

services:
  hop-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: ods-hop:latest
    container_name: ods-hop-server
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      HOP_LOG_LEVEL: Basic
    volumes:
      - ./projects:/home/hop/projects
      - hop-data:/home/hop/data
    networks:
      - ods-network

volumes:
  hop-data:

networks:
  ods-network:
    name: ods-network
    external: true
