# ONE-DATA-STUDIO-LITE - DataHub 部署
# 端口: 9002 (Frontend), 8080 (GMS API)
# 参考: https://datahubproject.io/docs/quickstart

services:
  # ========== 依赖服务 ==========
  datahub-mysql:
    image: mysql:8.0
    container_name: ods-datahub-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: datahub2024
      MYSQL_DATABASE: datahub
    ports:
      - "3307:3306"
    volumes:
      - datahub-mysql-data:/var/lib/mysql
    networks:
      - ods-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  datahub-elasticsearch:
    image: elasticsearch:7.17.18
    container_name: ods-datahub-es
    restart: unless-stopped
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      xpack.security.enabled: "false"
    ports:
      - "9200:9200"
    volumes:
      - datahub-es-data:/usr/share/elasticsearch/data
    networks:
      - ods-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  datahub-zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ods-datahub-zk
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ods-network

  datahub-kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ods-datahub-kafka
    restart: unless-stopped
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: datahub-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://datahub-kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - ods-network
    depends_on:
      - datahub-zookeeper

  datahub-schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: ods-datahub-schema-registry
    restart: unless-stopped
    environment:
      SCHEMA_REGISTRY_HOST_NAME: datahub-schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: datahub-kafka:9092
    networks:
      - ods-network
    depends_on:
      - datahub-kafka

  # ========== DataHub 核心服务 ==========
  datahub-gms:
    image: acryldata/datahub-gms:v0.13.2
    container_name: ods-datahub-gms
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      DATAHUB_SERVER_TYPE: quickstart
      EBEAN_DATASOURCE_URL: "jdbc:mysql://datahub-mysql:3306/datahub?verifyServerCertificate=false&useSSL=false&useUnicode=yes&characterEncoding=UTF-8"
      EBEAN_DATASOURCE_USERNAME: root
      EBEAN_DATASOURCE_PASSWORD: datahub2024
      EBEAN_DATASOURCE_DRIVER: com.mysql.jdbc.Driver
      ELASTICSEARCH_HOST: datahub-elasticsearch
      ELASTICSEARCH_PORT: "9200"
      KAFKA_BOOTSTRAP_SERVER: datahub-kafka:9092
      KAFKA_SCHEMAREGISTRY_URL: http://datahub-schema-registry:8081
      ENTITY_REGISTRY_CONFIG_PATH: /datahub/datahub-gms/resources/entity-registry.yml
    networks:
      - ods-network
    depends_on:
      datahub-mysql:
        condition: service_healthy
      datahub-elasticsearch:
        condition: service_healthy

  datahub-frontend:
    image: acryldata/datahub-frontend-react:v0.13.2
    container_name: ods-datahub-frontend
    restart: unless-stopped
    ports:
      - "9002:9002"
    environment:
      DATAHUB_GMS_HOST: datahub-gms
      DATAHUB_GMS_PORT: "8080"
      DATAHUB_SECRET: "YouKnowNothing"
      DATAHUB_APP_VERSION: "1.0"
      DATAHUB_PLAY_MEM_BUFFER_SIZE: "10MB"
    networks:
      - ods-network
    depends_on:
      - datahub-gms

  # ========== DataHub 辅助服务 ==========
  datahub-actions:
    image: acryldata/datahub-actions:v0.0.15
    container_name: ods-datahub-actions
    restart: unless-stopped
    environment:
      DATAHUB_GMS_URL: "http://datahub-gms:8080"
      DATAHUB_GMS_TOKEN: ""
      KAFKA_BOOTSTRAP_SERVER: datahub-kafka:9092
      SCHEMA_REGISTRY_URL: http://datahub-schema-registry:8081
    networks:
      - ods-network
    depends_on:
      - datahub-gms

volumes:
  datahub-mysql-data:
  datahub-es-data:

networks:
  ods-network:
    name: ods-network
    external: true
