# ONE-DATA-STUDIO-LITE - DataHub MySQL 数据源采集配置
# 用途: 自动采集业务数据库的元数据（表结构、字段信息、统计信息）
# 使用方式: datahub ingest -c mysql-recipe.yml
# 注意: 使用前请设置环境变量 MYSQL_PASSWORD

source:
  type: mysql
  config:
    host_port: "${MYSQL_HOST:-host.docker.internal}:${MYSQL_PORT:-3306}"
    database: "${MYSQL_DATABASE:-one_data_warehouse}"
    username: "${MYSQL_USERNAME:-root}"
    password: "${MYSQL_PASSWORD}"  # 必须通过环境变量设置

    # 包含的数据库模式
    database_pattern:
      allow:
        - "one_data_.*"
        - "business_.*"
      deny:
        - "mysql"
        - "information_schema"
        - "performance_schema"
        - "sys"

    # 包含的表
    table_pattern:
      allow:
        - ".*"
      deny:
        - ".*_tmp$"
        - ".*_bak$"

    # 启用数据概要分析（采集字段统计信息）
    profiling:
      enabled: true
      profile_table_level_only: false
      max_number_of_fields_to_profile: 50
      profile_table_row_count_estimate_only: false

    # 启用数据血缘采集
    include_tables: true
    include_views: true

sink:
  type: datahub-rest
  config:
    server: "http://datahub-gms:8080"
