# ONE-DATA-STUDIO-LITE 应用数据库
# 用于 Portal、NL2SQL、AI清洗、元数据同步等服务的数据库

version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ods-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: changeme
      MYSQL_DATABASE: one_data_studio
      MYSQL_USER: ods_user
      MYSQL_PASSWORD: ods_password
      TZ: Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - one-data-studio-network

volumes:
  mysql_data:
    driver: local

networks:
  one-data-studio-network:
    external: true
