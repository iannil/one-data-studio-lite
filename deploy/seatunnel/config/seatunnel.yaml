# ONE-DATA-STUDIO-LITE - Apache SeaTunnel 基础配置
# 参考: https://seatunnel.apache.org/docs/seatunnel-engine/deployment

seatunnel:
  engine:
    # 集群模式：单机开发用 standalone
    cluster-mode: standalone

    # 检查点存储配置
    checkpoint:
      storage:
        type: localfile
        max-retained: 3
        plugin-config:
          namespace: /opt/seatunnel/data/checkpoint

    # 线程池配置 (适配单机开发)
    slot-service:
      dynamic-slot: true

    # REST API 配置
    http:
      port: 5801
      enable-dynamic-port: false

    # 日志配置
    logging:
      level: INFO
