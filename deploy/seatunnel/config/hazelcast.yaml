hazelcast:
  cluster-name: seatunnel
  network:
    port:
      auto-increment: true
      port: 5802
    join:
      multicast:
        enabled: false
      tcp-ip:
        enabled: true
        member-list:
          - localhost
    rest-api:
      enabled: true
      endpoint-groups:
        CLUSTER_READ:
          enabled: true
        CLUSTER_WRITE:
          enabled: true
        DATA:
          enabled: true
        HEALTH_CHECK:
          enabled: true
  properties:
    hazelcast.logging.type: slf4j
    hazelcast.rest.enabled: true
