# ONE-DATA-STUDIO-LITE - Cube-Studio 部署 (Docker Compose 本地开发版)
# 端口: 30080 (Frontend), 80 (Backend API)
# 参考: https://github.com/tencentmusic/cube-studio

services:
  # ========== 依赖服务 ==========
  cube-redis:
    image: ccr.ccs.tencentyun.com/cube-studio/redis:7.4
    container_name: ods-cube-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: admin
    networks:
      - ods-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "admin", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  cube-mysql:
    image: mysql:8.0.32
    container_name: ods-cube-mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: kubeflow
    ports:
      - "3308:3306"
    volumes:
      - cube-mysql-data:/var/lib/mysql
      - ./config/mysqld.cnf:/etc/mysql/mysql.conf.d/mysqld.cnf
    networks:
      - ods-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ========== Cube-Studio 核心服务 ==========
  cube-frontend:
    image: ccr.ccs.tencentyun.com/cube-studio/kubeflow-dashboard-frontend:2026.01.01
    container_name: ods-cube-frontend
    restart: unless-stopped
    command: ['sh','-c','nginx -g "daemon off;"']
    ports:
      - "30080:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - ods-network
    depends_on:
      cube-myapp:
        condition: service_started

  cube-myapp:
    image: ccr.ccs.tencentyun.com/cube-studio/kubeflow-dashboard:2026.01.01
    container_name: ods-cube-myapp
    restart: unless-stopped
    command: ['bash','-c','/entrypoint.sh']
    environment:
      STAGE: "dev"
      REDIS_HOST: cube-redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "admin"
      MYSQL_SERVICE: "mysql+pymysql://root:admin@cube-mysql:3306/kubeflow?charset=utf8mb4"
      ENVIRONMENT: DEV
    volumes:
      - ./config/entrypoint.sh:/entrypoint.sh
      - ./config/config.py:/home/myapp/myapp/config.py
      - cube-myapp-data:/data/k8s/kubeflow
    networks:
      - ods-network
    depends_on:
      cube-mysql:
        condition: service_healthy
      cube-redis:
        condition: service_healthy

volumes:
  cube-mysql-data:
  cube-myapp-data:

networks:
  ods-network:
    name: ods-network
    external: true
