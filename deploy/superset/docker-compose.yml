# ONE-DATA-STUDIO-LITE - Apache Superset 部署
# 端口: 8088 (Web UI)
# 支持环境变量配置管理员凭据

services:
  superset-db:
    image: postgres:15-alpine
    container_name: ods-superset-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      # 生产环境应该使用强密码
      POSTGRES_PASSWORD: ${SUPERSET_DB_PASSWORD:-superset_change_in_production}
    volumes:
      - superset-db-data:/var/lib/postgresql/data
    networks:
      - ods-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset"]
      interval: 5s
      timeout: 3s
      retries: 5

  superset-redis:
    image: redis:7-alpine
    container_name: ods-superset-redis
    restart: unless-stopped
    volumes:
      - superset-redis-data:/data
    networks:
      - ods-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  superset-init:
    image: apache/superset:3.1.0
    container_name: ods-superset-init
    command: >
      bash -c "
        echo 'Initializing Superset...' &&
        superset db upgrade &&
        echo 'Creating admin user...' &&
        superset fab create-admin \\
          --username ${SUPERSET_ADMIN_USER:-admin} \\
          --firstname Admin \\
          --lastname User \\
          --email ${SUPERSET_ADMIN_EMAIL:-admin@onedata.local} \\
          --password ${SUPERSET_ADMIN_PASSWORD:-admin123} || true &&
        echo 'Initializing Superset...' &&
        superset init &&
        echo 'Superset initialization complete!'
      "
    environment: &superset-env
      # 数据库连接
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: ${SUPERSET_DB_PASSWORD:-superset_change_in_production}
      POSTGRES_HOST: superset-db
      POSTGRES_PORT: 5432

      # Superset 配置
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-one-data-studio-superset-secret-key-change-in-production}
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://superset:${SUPERSET_DB_PASSWORD:-superset_change_in_production}@superset-db:5432/superset
      REDIS_URL: redis://superset-redis:6379/0

      # 禁用示例数据
      SUPERSET_LOAD_EXAMPLES: "no"

      # 日志级别
      SUPERSET_LOG_LEVEL: ${SUPERSET_LOG_LEVEL:-INFO}
      # 禁用 CSRF（仅开发环境，生产环境需要启用）
      SUPERSET_CSRF_ENABLED: "false"
      # 允许跨域请求（开发环境）
      SUPERSET_REACT_BUILD_BASE: "/static"
    networks:
      - ods-network
    depends_on:
      superset-db:
        condition: service_healthy
      superset-redis:
        condition: service_healthy
    # 启动时检查安全配置
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/superset_home/.initialized || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  superset:
    image: apache/superset:3.1.0
    container_name: ods-superset
    restart: unless-stopped
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    environment: *superset-env
    volumes:
      - superset-home:/app/superset_home
    networks:
      - ods-network
    depends_on:
      superset-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  superset-worker:
    image: apache/superset:3.1.0
    container_name: ods-superset-worker
    restart: unless-stopped
    command: celery --app=superset.tasks.celery_app:app worker --pool=prefork -O fair -c 2
    environment: *superset-env
    volumes:
      - superset-home:/app/superset_home
    networks:
      - ods-network
    depends_on:
      superset-init:
        condition: service_completed_successfully

volumes:
  superset-db-data:
    driver: local
    name: one-data-studio-superset-db-data
  superset-redis-data:
    driver: local
    name: one-data-studio-superset-redis-data
  superset-home:
    driver: local
    name: one-data-studio-superset-home

networks:
  ods-network:
    name: ods-network
    external: true
