# ONE-DATA-STUDIO-LITE - Apache Superset 部署
# 端口: 8088 (Web UI)
# 注意: 使用前请创建 .env 文件或设置环境变量

services:
  superset-init:
    image: apache/superset:3.1.0
    container_name: ods-superset-init
    command: >
      sh -c "
        superset db upgrade &&
        superset fab create-admin \
          --username admin \
          --firstname Admin \
          --lastname User \
          --email admin@onedata.local \
          --password $${SUPERSET_ADMIN_PASSWORD:-admin123} &&
        superset init
      "
    environment: &superset-env
      SUPERSET_SECRET_KEY: "${SUPERSET_SECRET_KEY:-change-this-secret-key-in-production}"
      SQLALCHEMY_DATABASE_URI: "${SUPERSET_DATABASE_URI:-mysql+pymysql://root:changeme@host.docker.internal:3306/superset}"
      REDIS_URL: "redis://superset-redis:6379/0"
      SUPERSET_LOAD_EXAMPLES: "no"
    volumes:
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
    networks:
      - ods-network
    depends_on:
      superset-redis:
        condition: service_healthy

  superset:
    image: apache/superset:3.1.0
    container_name: ods-superset
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment: *superset-env
    volumes:
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
      - superset-home:/app/superset_home
    networks:
      - ods-network
    depends_on:
      superset-init:
        condition: service_completed_successfully
      superset-redis:
        condition: service_healthy

  superset-worker:
    image: apache/superset:3.1.0
    container_name: ods-superset-worker
    restart: unless-stopped
    command: celery --app=superset.tasks.celery_app:app worker --pool=prefork -O fair -c 2
    environment: *superset-env
    volumes:
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
      - superset-home:/app/superset_home
    networks:
      - ods-network
    depends_on:
      superset-init:
        condition: service_completed_successfully

  superset-beat:
    image: apache/superset:3.1.0
    container_name: ods-superset-beat
    restart: unless-stopped
    command: celery --app=superset.tasks.celery_app:app beat --pidfile /tmp/celerybeat.pid -s /tmp/celerybeat-schedule
    environment: *superset-env
    volumes:
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
    networks:
      - ods-network
    depends_on:
      superset-init:
        condition: service_completed_successfully

  superset-redis:
    image: redis:7-alpine
    container_name: ods-superset-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - superset-redis-data:/data
    networks:
      - ods-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  superset-home:
  superset-redis-data:

networks:
  ods-network:
    name: ods-network
    external: true
