# One Data Studio Lite - Production Environment Overlay
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: one-data-studio-prod

# Reference to base configuration
resources:
  - ../../base

# Common labels for production
commonLabels:
  environment: production
  team: data-platform

# Patches for production environment
patches:
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: backend-hpa
      spec:
        minReplicas: 3
        maxReplicas: 20
        behavior:
          scaleDown:
            stabilizationWindowSeconds: 300
            policies:
              - type: Percent
                value: 50
                periodSeconds: 60
          scaleUp:
            stabilizationWindowSeconds: 0
            policies:
              - type: Percent
                value: 100
                periodSeconds: 30
              - type: Pods
                value: 5
                periodSeconds: 60
            selectPolicy: Max
    target:
      kind: HorizontalPodAutoscaler
      name: backend-hpa
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: frontend-hpa
      spec:
        minReplicas: 3
        maxReplicas: 20
    target:
      kind: HorizontalPodAutoscaler
      name: frontend-hpa
  - patch: |-
      apiVersion: policy/v1
      kind: PodDisruptionBudget
      metadata:
        name: backend-pdb
      spec:
        minAvailable: 2
    target:
      kind: PodDisruptionBudget
      name: backend-pdb
  - patch: |-
      apiVersion: policy/v1
      kind: PodDisruptionBudget
      metadata:
        name: frontend-pdb
      spec:
        minAvailable: 2
    target:
      kind: PodDisruptionBudget
      name: frontend-pdb

# ConfigMap generator for production settings
configMapGenerator:
  - name: app-env
    literals:
      - APP_ENV=production
      - LOG_LEVEL=INFO
      - ENABLE_TRACING=true
      - ENABLE_METRICS=true
      - ENABLE_AUDIT_LOG=true

# Images for production (use specific version tags)
images:
  - name: backend
    newName: one-data-studio/backend
    newTag: v1.0.0
  - name: frontend
    newName: one-data-studio/frontend
    newTag: v1.0.0

# Resource overrides for production
patchesStrategicMerge:
  - |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: backend
    spec:
      replicas: 3
      template:
        spec:
          containers:
            - name: backend
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: 2000m
                  memory: 4Gi
              env:
                - name: ENABLE_PROFILING
                  value: "false"
  - |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: frontend
    spec:
      replicas: 3
      template:
        spec:
          containers:
            - name: frontend
              resources:
                requests:
                  cpu: 200m
                  memory: 512Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
  - |-
    apiVersion: apps/v1
    kind: StatefulSet
    metadata:
      name: postgres
    spec:
      template:
        spec:
          containers:
            - name: postgres
              resources:
                requests:
                  cpu: 1000m
                  memory: 2Gi
                limits:
                  cpu: 4000m
                  memory: 8Gi

# Production ingress with TLS
patchesJson6902:
  - target:
      group: networking.k8s.io
      version: v1
      kind: Ingress
      name: one-data-studio-ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: one-data-studio.example.com
      - op: replace
        path: /spec/rules/1/host
        value: api.one-data-studio.example.com
      - op: replace
        path: /spec/tls/0/secretName
        value: one-data-studio-prod-tls
