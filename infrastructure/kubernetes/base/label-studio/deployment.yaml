---
# Label Studio Deployment
# Data annotation platform with multi-modal support
apiVersion: apps/v1
kind: Deployment
metadata:
  name: label-studio
  namespace: label-studio
  labels:
    app: label-studio
    component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: label-studio
      component: web
  template:
    metadata:
      labels:
        app: label-studio
        component: web
    spec:
      containers:
      - name: label-studio
        image: heartexlabs/label-studio:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        # PostgreSQL Database
        - name: POSTGRES_HOST
          value: postgres
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: config
              key: database.name
        # Redis (for caching and task queues)
        - name: REDIS_HOST
          value: redis
        - name: REDIS_PORT
          value: "6379"
        # MinIO (S3-compatible storage for artifacts)
        - name: AWS_S3_ENDPOINT_URL
          value: http://minio:9000
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: minio-secret
              key: access-key
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-secret
              key: secret-key
        - name: AWS_BUCKET_NAME
          valueFrom:
            configMapKeyRef:
              name: minio-config
              key: bucket
        # OAuth2 Configuration (optional)
        - name: LABEL_STUDIO_OAUTH2_CLIENT_ID
          valueFrom:
            configMapKeyRef:
              name: label-studio-config
              key: oauth2.client_id
              optional: true
        - name: LABEL_STUDIO_OAUTH2_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: label-studio-secret
              key: oauth2.client_secret
              optional: true
        - name: LABEL_STUDIO_OAUTH2_AUTHORIZATION_URL
          valueFrom:
            configMapKeyRef:
              name: label-studio-config
              key: oauth2.auth_url
              optional: true
        - name: LABEL_STUDIO_OAUTH2_TOKEN_URL
          valueFrom:
            configMapKeyRef:
              name: label-studio-config
              key: oauth2.token_url
              optional: true
        # MLflow integration for model-assisted annotation
        - name: LABEL_STUDIO_MLFLOW_TRACKING_URI
          valueFrom:
            configMapKeyRef:
              name: mlflow-config
              key: MLFLOW_TRACKING_URI
              optional: true
        # Custom branding
        - name: LABEL_STUDIO_HOST
          value: annotation.one-data-studio.local
        # Username for initial admin user
        - name: LABEL_STUDIO_USERNAME
          valueFrom:
            secretKeyRef:
              name: label-studio-secret
              key: username
        - name: LABEL_STUDIO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: label-studio-secret
              key: password
        # Logging
        - name: LABEL_STUDIO_LOG_LEVEL
          value: INFO
        # Storage
        - name: LABEL_STUDIO_DATA_DIR
          value: /label-studio/data
        volumeMounts:
        - name: data
          mountPath: /label-studio/data
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: label-studio-pvc
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: label-studio
  namespace: label-studio
  labels:
    app: label-studio
    component: web
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    name: http
    protocol: TCP
  selector:
    app: label-studio
    component: web
---
# Persistent Volume Claim for Label Studio data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: label-studio-pvc
  namespace: label-studio
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
# ConfigMap for Label Studio configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: label-studio-config
  namespace: label-studio
data:
  # OAuth2 Configuration (optional - configure with your OAuth provider)
  oauth2.client_id: "one-data-studio"
  oauth2.auth_url: "https://oauth.provider.com/auth"
  oauth2.token_url: "https://oauth.provider.com/token"
  # Label Studio settings
  label_studio_host: "annotation.one-data-studio.local"
  # Custom labeling configuration (JSON)
  labeling_config: |
    {
      "sampling": 0.1,
      "auto_annotation": {
        "enabled": true,
        "model": "gpt-4-vision-preview",
        "confidence_threshold": 0.8
      }
    }
---
# Secret for Label Studio
apiVersion: v1
kind: Secret
metadata:
  name: label-studio-secret
  namespace: label-studio
type: Opaque
stringData:
  # Initial admin credentials (CHANGE IN PRODUCTION)
  username: admin
  password: changeme123
  # OAuth2 client secret (if using OAuth2)
  oauth2.client_secret: "your-client-secret-here"
---
# Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: label-studio
  namespace: label-studio
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: "selfsigned-issuer"
    ingress.kubernetes.io/ssl-redirect: "true"
    traefik.ingress.kubernetes.io/router.middlewares: "label-studio-striper@file"
spec:
  rules:
  - host: annotation.one-data-studio.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: label-studio
            port:
              number: 8080
  tls:
  - hosts:
    - annotation.one-data-studio.local
    secretName: one-data-studio-tls
---
# StripPrefix middleware for Label Studio
apiVersion: traefik.containous.io/v1alpha1
kind: Middleware
metadata:
  name: label-studio-stripper
  namespace: label-studio
spec:
  stripPrefix:
    prefixes:
      - /annotation
---
# HorizontalPodAutoscaler for Label Studio
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: label-studio-hpa
  namespace: label-studio
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: label-studio
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 1
        periodSeconds: 30
---
# PodDisruptionBudget for Label Studio
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: label-studio-pdb
  namespace: label-studio
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: label-studio
