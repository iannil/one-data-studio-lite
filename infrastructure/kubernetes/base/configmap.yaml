# One Data Studio Lite - Application ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: one-data-studio
  labels:
    app: one-data-studio
    component: config
data:
  # Application settings
  APP_ENV: "production"
  APP_NAME: "one-data-studio-lite"
  API_V1_PREFIX: "/api/v1"

  # CORS settings
  CORS_ORIGINS: "http://localhost:3100,http://localhost:3000"
  CORS_ALLOW_CREDENTIALS: "true"
  CORS_ALLOW_METHODS: "GET,POST,PUT,DELETE,OPTIONS,PATCH"
  CORS_ALLOW_HEADERS: "*"

  # Database settings (will be overridden by secret for password)
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "smart_data"
  DB_USER: "postgres"

  # Redis settings
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"

  # Celery settings
  CELERY_BROKER_URL: "redis://redis:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis:6379/2"

  # MinIO settings
  MINIO_ENDPOINT: "minio:9000"
  MINIO_BUCKET: "one-data-studio"
  MINIO_USE_SSL: "false"

  # Superset settings
  SUPERSET_URL: "http://superset:8088"

  # Logging settings
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"

  # observability settings
  ENABLE_TRACING: "true"
  ENABLE_METRICS: "true"
  JAEGER_HOST: "jaeger"
  JAEGER_PORT: "6831"
