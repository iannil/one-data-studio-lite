# One Data Studio Lite - Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: one-data-studio
  labels:
    app: frontend
    component: ui
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    protocol: TCP
  selector:
    app: frontend
