# One Data Studio Lite - Jupyter Hub Proxy Configuration
# This file contains the proxy settings for Jupyter Hub

# Configurable HTTP Proxy settings
# The proxy handles WebSocket connections and routing to user notebooks

# Proxy environment variables (set in Deployment)
# PROXY_PUBLIC_PORT: 8000
# PROXY_API_PORT: 8001
# PROXY_SERVICE_HOST: 0.0.0.0

# WebSocket configuration
# CHP-proxy is configured to handle WebSocket upgrades automatically
# The following paths require WebSocket support:
# - /user/{username}//*  - Notebook communication
# - /api/kernels/*       - Kernel messages
# - /terminals/*         - Terminal sessions

