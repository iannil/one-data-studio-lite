# One Data Studio Lite - Jupyter Hub Service
apiVersion: v1
kind: Service
metadata:
  name: jupyterhub
  namespace: one-data-studio
  labels:
    app: jupyterhub
    component: notebook
spec:
  type: ClusterIP
  ports:
  - name: proxy
    port: 8000
    targetPort: 8000
    protocol: TCP
  - name: hub
    port: 8081
    targetPort: 8081
    protocol: TCP
  - name: api
    port: 8001
    targetPort: 8001
    protocol: TCP
  selector:
    app: jupyterhub
---
# Jupyter Hub Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jupyterhub
  namespace: one-data-studio
  labels:
    app: jupyterhub
    component: notebook
---
# Jupyter Hub Role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jupyterhub
  namespace: one-data-studio
  labels:
    app: jupyterhub
    component: notebook
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - persistentvolumeclaims
  verbs:
  - get
  - list
  - watch
  - create
  - delete
- apiGroups:
  - ""
  resources:
  - pods/log
  - pods/exec
  verbs:
  - get
  - create
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
  - create
  - delete
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  verbs:
  - get
  - list
  - watch
  - create
  - delete
---
# Jupyter Hub RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jupyterhub
  namespace: one-data-studio
  labels:
    app: jupyterhub
    component: notebook
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jupyterhub
subjects:
- kind: ServiceAccount
  name: jupyterhub
  namespace: one-data-studio
---
# Jupyter Hub ClusterRole (for multi-namespace support)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jupyterhub
  labels:
    app: jupyterhub
    component: notebook
rules:
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
---
# Jupyter Hub ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jupyterhub
  labels:
    app: jupyterhub
    component: notebook
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: jupyterhub
subjects:
- kind: ServiceAccount
  name: jupyterhub
  namespace: one-data-studio
