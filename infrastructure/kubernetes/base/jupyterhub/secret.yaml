# One Data Studio Lite - Jupyter Hub Secret
apiVersion: v1
kind: Secret
metadata:
  name: jupyterhub-secret
  namespace: one-data-studio
  labels:
    app: jupyterhub
    component: notebook
type: Opaque
stringData:
  # Database password (should be overridden in production)
  POSTGRES_PASSWORD: "jupyterhub_db_password"

  # Admin token (should be overridden in production)
  JUPYTERHUB_CRYPT_KEY: "change-this-to-a-random-string"

  # OAuth credentials (if using OAuth)
  # OAUTH_CLIENT_ID: "your-client-id"
  # OAUTH_CLIENT_SECRET: "your-client-secret"
  # OAUTH_CALLBACK_URL: "http://localhost:8000/jupyter/oauth_callback"
