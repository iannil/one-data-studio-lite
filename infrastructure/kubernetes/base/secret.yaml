# One Data Studio Lite - Secret Template
# NOTE: This is a template. Actual secrets should be created using:
# kubectl create secret generic app-secrets --from-literal=DATABASE_URL='...' --from-literal=SECRET_KEY='...'
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: one-data-studio
  labels:
    app: one-data-studio
    component: secret
type: Opaque
# data values must be base64 encoded
# Example:
# DATABASE_URL: cG9zdGdyZXNxbCthc3luY3BnOi8vcG9zdGdyZXM6cGFzc3dvcmRAcG9zdGdyZXM6NTQzMi9zbWFydF9kYXRh
# SECRET_KEY: eW91ci1zZWNyZXQta2V5LWhlcmU=
# OPENAI_API_KEY: c2stLi4u
stringData:
  # Database connection string (will be constructed from DB_* vars or provided directly)
  DATABASE_URL: "postgresql+asyncpg://postgres:changeme@postgres:5432/smart_data"

  # JWT secret key
  SECRET_KEY: "changeme-in-production-use-openssl-rand-hex-32"

  # OpenAI API Key
  OPENAI_API_KEY: "sk-your-openai-api-key"

  # MinIO credentials
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "minioadmin"

  # Superset credentials
  SUPERSET_USERNAME: "admin"
  SUPERSET_PASSWORD: "changeme"

  # SMTP settings (for alerts)
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_USER: ""
  SMTP_PASSWORD: ""
  SMTP_FROM: "noreply@one-data-studio.local"
