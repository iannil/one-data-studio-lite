# One Data Studio Lite - PostgreSQL StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: one-data-studio
  labels:
    app: postgres
    component: database
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        component: database
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - name: postgres
          containerPort: 5432
          protocol: TCP
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: POSTGRES_PASSWORD
              optional: true
        - name: POSTGRES_DB
          value: "smart_data"
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        - name: POSTGRES_INITDB_ARGS
          value: "-E UTF8 --locale=C"
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: init-scripts
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - pg_isready -U postgres -d smart_data
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - pg_isready -U postgres -d smart_data
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
      volumes:
      - name: init-scripts
        configMap:
          name: postgres-init
          optional: true
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
      labels:
        app: postgres
        component: database
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
      storageClassName: standard
---
# ConfigMap for PostgreSQL initialization scripts
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: one-data-studio
  labels:
    app: postgres
    component: database
data:
  init.sql: |
    -- One Data Studio Lite - PostgreSQL Init Script

    -- Enable required extensions
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "pg_trgm";  -- For text search
    CREATE EXTENSION IF NOT EXISTS "btree_gin";  -- For composite indexes

    -- Create schemas for different subsystems
    CREATE SCHEMA IF NOT EXISTS metadata;
    CREATE SCHEMA IF NOT EXISTS etl;
    CREATE SCHEMA IF NOT EXISTS security;
    CREATE SCHEMA IF NOT EXISTS audit;

    -- Grant permissions
    GRANT ALL PRIVILEGES ON SCHEMA metadata TO postgres;
    GRANT ALL PRIVILEGES ON SCHEMA etl TO postgres;
    GRANT ALL PRIVILEGES ON SCHEMA security TO postgres;
    GRANT ALL PRIVILEGES ON SCHEMA audit TO postgres;

    -- Create custom types
    CREATE TYPE data_source_type AS ENUM (
        'postgresql', 'mysql', 'oracle', 'sqlserver', 'csv', 'excel', 'api', 'mongodb'
    );

    CREATE TYPE etl_step_type AS ENUM (
        'filter', 'aggregate', 'join', 'union', 'sort', 'deduplicate',
        'transform', 'lookup', 'validate', 'python', 'sql', 'custom'
    );

    CREATE TYPE task_status AS ENUM (
        'pending', 'running', 'success', 'failed', 'cancelled', 'retrying'
    );

    -- Create audit log table
    CREATE TABLE IF NOT EXISTS audit.audit_logs (
        id BIGSERIAL PRIMARY KEY,
        user_id INTEGER,
        username VARCHAR(255),
        action VARCHAR(100) NOT NULL,
        resource_type VARCHAR(100),
        resource_id VARCHAR(100),
        old_values JSONB,
        new_values JSONB,
        ip_address INET,
        user_agent TEXT,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        INDEX (user_id, created_at),
        INDEX (action, created_at)
    );

    COMMENT ON TABLE audit.audit_logs IS 'Audit log for all user actions';
