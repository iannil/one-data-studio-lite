# One Data Studio Lite - MinIO Service
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: one-data-studio
  labels:
    app: minio
    component: storage
spec:
  type: ClusterIP
  ports:
  - name: api
    port: 9000
    targetPort: 9000
    protocol: TCP
  - name: console
    port: 9001
    targetPort: 9001
    protocol: TCP
  selector:
    app: minio
---
# Headless service for StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: minio-headless
  namespace: one-data-studio
  labels:
    app: minio
    component: storage
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: api
    port: 9000
    targetPort: 9000
    protocol: TCP
  selector:
    app: minio
