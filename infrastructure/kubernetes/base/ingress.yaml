apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: one-data-studio-ingress
  namespace: one-data-studio
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: "one-data-studio-strip-api@kubernetescrd"
spec:
  tls:
  - hosts:
    - platform.example.com
    secretName: one-data-studio-tls
  rules:
  - host: platform.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000
---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: strip-api
  namespace: one-data-studio
spec:
  stripPrefix:
    prefixes:
      - /api
    forceSlash: false
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mlflow-ingress
  namespace: one-data-studio
  annotations:
    kubernetes.io/ingress.class: traefik
