# One Data Studio Lite - Airflow Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-config
  namespace: one-data-studio
  labels:
    app: airflow
data:
  # Airflow configuration
  airflow.cfg: |
    [core]
    # The home folder for airflow, default is ~/airflow
    airflow_home = /opt/airflow

    # The folder where your airflow pipelines live, most likely a
    # subfolder in a code repository
    dags_folder = /opt/airflow/dags

    # The folder where airflow should store its log files
    base_log_folder = /opt/airflow/logs

    # Airflow can store logs remotely in AWS S3, Google Cloud Storage or other filesystem
    # remote_base_log_folder =

    # Logging level
    logging_level = INFO

    # Logging class
    # Logging class to use
    logging_class = airflow.utils.log.logging_mixin.RedirectLoggingHandler

    # How often should DAGs be parsed in seconds
    dag_dir_list_interval = 300

    # The executor to use for task execution
    executor = CeleryExecutor

    # The SQLAlchemy connection string to the metadata database
    sql_engine = postgresql+psycopg2://airflow:airflow@postgres:5432/airflow

    # The encoding for the databases
    encoding = utf-8

    # Sqlalchemy pool settings
    sql_alchemy_pool_enabled = True
    sql_alchemy_pool_size = 5
    sql_alchemy_pool_max_overflow = 10

    # The amount of parallelism as a setting to the executor. This defines
    # the max number of task instances that should run simultaneously
    # on this airflow installation
    parallelism = 32

    # The maximum number of active DAG runs per DAG
    max_active_runs_per_dag = 16

    # Determines whether to use the scheduler catchup mechanism
    catchup_by_default = False

    # This changes the batch size on the scheduler main loop when iterating over
    # dags to identify tasks to run
    scheduler_heartbeat_sec = 5

    # Statsd (accessible via the statsd_exporter) integration settings
    # statsd_on = localhost
    # statsd_port = 8125
    # statsd_prefix = airflow

    # The hostname of the webserver
    web_server_host = 0.0.0.0

    # The port on which to run the web server
    web_server_port = 8080

    # Root URL for the webserver
    base_url = http://localhost:8080/airflow

    # Number of workers the celery executor should use
    worker_concurrency = 4

    # Worker initial retry count
    worker_initial_retry_count = 3

    # Celery broker URL
    broker_url = redis://redis:6379/0

    # Celery result backend
    result_backend = db+postgresql://airflow:airflow@postgres:5432/airflow

    # Flower configuration
    flower_host = 0.0.0.0
    flower_port = 5555
    flower_basic_auth = admin:admin

    # DAG configuration
    load_examples = False
    dag_discovery_safe_mode = True

    # Secret key for signing
    secret_key = change-this-to-a-random-string

    # Unit testing
    unit_test_mode = False

    # Role based access control
    rbac = False

    [webserver]
    # Expose the configuration file in the web UI
    expose_config = True

    # Authenticate connections to the webserver
    authenticate = False

    [logging]
    # Logging level
    base_log_folder = /opt/airflow/logs
    dag_processing_log_level = INFO

    [scheduler]
    # Task instances listen to external event scheduler service
    child_process_log_directory = /opt/airflow/logs/scheduler

    # The scheduler can run multiple subprocesses when parsing DAGs
    parse_processes = 2

    # PARSING PROCESSES
    # How many processes to parse DAGs in parallel
    dag_file_processor_timeout = 30

    [cli]
    # Command to run the web server
    webserver_backend = celery

  # Airflow environments for different deployments
  environments.json: |
    {
      "dev": {
        "sql_engine": "postgresql+psycopg2://airflow:airflow@postgres:5432/airflow"
      },
      "prod": {
        "sql_engine": "postgresql+psycopg2://airflow:airflow@postgres-prod:5432/airflow"
      }
    }
