# One Data Studio Lite - Prometheus Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
    component: monitoring
data:
  prometheus.yaml: |
    # Prometheus configuration for One Data Studio Lite

    global:
      scrape_interval: 15s
      scrape_timeout: 10s
      evaluation_interval: 15s
      external_labels:
        cluster: 'one-data-studio'
        environment: 'production'

    # Alertmanager configuration
    alerting:
      alertmanagers:
      - static_configs:
        - targets:
          - alertmanager:9093

    # Rule files
    rule_files:
    - '/etc/prometheus/rules/*.yml'

    # Scrape configurations
    scrape_configs:
    # Prometheus self-monitoring
    - job_name: 'prometheus'
      static_configs:
      - targets: ['localhost:9090']
      relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'prometheus'

    # Kubernetes API Server
    - job_name: 'kubernetes-apiservers'
      kubernetes_sd_configs:
      - role: endpoints
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: default;kubernetes;https
      - source_labels: [__meta_kubernetes_service_name]
        target_label: service

    # Kubernetes Nodes
    - job_name: 'kubernetes-nodes'
      kubernetes_sd_configs:
      - role: node
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)

    # One Data Studio - Backend
    - job_name: 'one-data-studio-backend'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - one-data-studio
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: backend
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        replacement: $1:8000
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: instance
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      metrics_path: /metrics

    # One Data Studio - Frontend (if metrics enabled)
    - job_name: 'one-data-studio-frontend'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - one-data-studio
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: frontend
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        replacement: $1:3000
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: instance
      metrics_path: /metrics

    # One Data Studio - Redis Exporter
    - job_name: 'one-data-studio-redis'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - one-data-studio
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: redis
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        replacement: $1:9121
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: instance
      metrics_path: /metrics

    # One Data Studio - PostgreSQL Exporter
    - job_name: 'one-data-studio-postgres'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - one-data-studio
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: postgres
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        replacement: $1:9187
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: instance
      metrics_path: /metrics

    # One Data Studio - MinIO
    - job_name: 'one-data-studio-minio'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - one-data-studio
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: minio
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        replacement: $1:9000
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: instance
      metrics_path: /minio/v2/metrics/cluster
      scheme: http

    # Kubernetes cAdvisor
    - job_name: 'kubernetes-cadvisor'
      kubernetes_sd_configs:
      - role: node
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - source_labels: [__meta_kubernetes_node_name]
        target_label: instance
      - target_label: __address__
        replacement: kubernetes.default.svc:443
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
