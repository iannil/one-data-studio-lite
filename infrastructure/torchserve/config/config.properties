# TorchServe Configuration File
# See: https://github.com/pytorch/serve/blob/master/docs/configuration.md

inference_address=http://0.0.0.0:8080
management_address=http://0.0.0.0:8081
metrics_address=http://0.0.0.0:8082

# Number of workers for model serving
default_workers_per_model=2

# Model loading timeout
load_models_all_workers=true

# Job queue size
max_response_size=6553500
max_request_size=104857600

# Snapshot settings
snapshot_store=/home/model-server/logs/config

# Logging
log_location=/home/model-server/logs
log4j_config_file=/home/model-server/config/log4j2.xml

# Metrics
metrics_mode=prometheus
# prometheus_metrics_port=8082

# API version
enable_new_api=true

# CORS (for development)
cors_allowed_origin=*
cors_allowed_methods=GET,POST,PUT,DELETE,OPTIONS
cors_allowed_headers=Content-Type,Authorization

# Number of netty threads
netty_threads=32

# Maximum number of workers
max_workers=12

# Model config
model_store=/home/model-server/model-store
