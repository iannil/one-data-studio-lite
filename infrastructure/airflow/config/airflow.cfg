[core]
# The home folder for airflow, default is ~/airflow
airflow_home = /opt/airflow

# The folder where your airflow pipelines live, mainly expected to be a git repository
dags_folder = /opt/airflow/dags

# The folder where airflow should store its log files
base_log_folder = /opt/airflow/logs

# The folder where airflow should store its pid files
pidfile_folder = /opt/airflow

# The executor class that airflow should use
executor = CeleryExecutor

# The SqlAlchemy connection string to the metadata database
sql_alchemy_conn = postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow

# The encoding of the airflow databases
sql_engine_encoding = utf-8

# Sqlalchemy pool size
sql_alchemy_pool_size = 5

# The SqlAlchemy pool recycle
sql_alchemy_pool_recycle = 3600

# How many seconds to retry the DB connection if it fails
sql_alchemy_reconnect_timeout = 5

# The maximum size of the connection pool
sql_alchemy_max_overflow = 10

# Whether to disable the pooling of DB connections
sql_alchemy_pool_pre_ping = True

# Pickle protocol version for task instance serialization
pickle_protocol = 4

# Don't load examples
load_examples = False

# Plugins folder
plugins_folder = /opt/airflow/plugins

# Set to true to enable FAB-based authentication
authenticate = True

# Set to true to enable X-Frame options header
frame_url = http://localhost:3108

#dagbag_import_timeout = 30
dag_discovery_safe_mode = False

[api]
# How to authenticate users of the API
auth_backend = airflow.api.auth.backend.basic_auth

[cli]
# In what way should the cli access the API
api_client = airflow.api.client.local_client

[logging]
# The folder where airflow should store its log files
base_log_folder = /opt/airflow/logs

# Logging level
logging_level = INFO

# Logging format
log_format = [%%(asctime)s] {%%(filename)s:%%(lineno)d} %%%(levelname)s - %%%(message)s

# Simple log format
simple_log_format = %%%(levelname)s - %%%(message)s

# Log filename format
log_filename_template = dag_name={dag_id}/run_id={run_id}/task={task_name}/%%Y-%%m-%%d.log

# Log processor filename template
log_processor_filename_template = {{ filename }}.log

# DAG log processor
dag_processor_manager_log_location = /opt/airflow/logs/dag_processor_manager.log

[metrics]
# Statsd settings
statsd_on = False
statsd_host = localhost
statsd_port = 8125
statsd_prefix = airflow

[secrets]
# Secret key for session encryption
secret_key = temporary_secret_key_change_in_production

[webserver]
# The base url of your website as airflow cannot guess what domain or
# cname you are using. This is used in automated emails generated
# by airflow, in the airflow docs and in the airflow UI
base_url = http://localhost:3108

# The ip specified when starting the web server
web_server_host = 0.0.0.0

# The port on which to run the web server
web_server_port = 8080

# Paths to the SSL certificate and key for the web server
web_server_ssl_cert =
web_server_ssl_key =

# Number of workers to run the Gunicorn web server
workers = 4

# The worker class gunicorn should use
worker_class = sync

# Expose the configuration file in the web server
expose_config = True

# Set to true to enable FAB-based authentication
authenticate = True

# Set to true to enable X-Frame options header
frame_url = http://localhost:3108

# Filter the list of dags by owner
filter_by_owner = False

# Updating DAGs list after this amount of seconds
dag_dir_list_interval = 30

# The number of items to show on the list and status pages
page_size = 100

# The amount of time (in secs) that the webserver will wait for the
# gunicorn to gracefully shutdown
web_server_worker_timeout = 120

# Whether to enable CeleryCanvas with the web UI
enable_proxy_fix = False

[smtp]
# If you want airflow to send emails on retries, failure, and you want to use
# the airflow.utils.email.send_email_smtp function, you have to configure the
# smtp section here
# smtp_host = smtp.gmail.com
# smtp_starttls = True
# smtp_ssl = False
# smtp_port = 587
# smtp_mail_from = airflow@example.com
# smtp_password = secret_password
# smtp_user = airflow_username

[celery]
# This section is for CeleryExecutor only
# Celery broker URL
broker_url = redis://:@airflow-redis:6379/0

# Celery result backend
result_backend = db+postgresql://airflow:airflow@airflow-postgres:5432/airflow

# Celery configuration
# Celery flower host
flower_host = 0.0.0.0

# Celery flower port
flower_port = 5555

# Default queue that tasks get scheduled to
default_queue = default

# Concurrency of celery workers
worker_concurrency = 16

# Prefetch multiplier for celery workers
worker_prefetch_multiplier = 1

# Celery worker autoscale
worker_autoscale = 16,8

# Time to wait (in seconds) before sending a SIGKILL to a worker
worker_max_tasks_per_child = 1000

[dag_processing]
# The number of times to scan the DAGs directory for new files
dag_dir_list_interval = 30

# How long before timing out a python file import while filling the DagBag
file_parsing_timeout = 30

[scheduler]
# The scheduler can run multiple threads in parallel to schedule dags
# This defines the number of parallel threads
max_threads = 2

# Task instances listen for external change of state
# like execution failures
# You can set it to False if you want tasks to wait until the
# scheduler parses the task
listen_for_external_change = False

# Define how often a DagFileProcessor should check the DagBag for tasks that
# could be scheduled
scheduler_health_check_threshold = 30

# Turn off scheduler compatibility with serialized DAGs
# Turn on to use the legacy scheduler behavior
use_job_schedule = True

# How many seconds to wait before timing out a dag file parse
parsing_timeout = 30

# How often (in seconds) to scan the DAGs directory for new files
dag_dir_list_interval = 30

# How often (in seconds) to check for orphaned tasks
orphaned_tasks_check_interval = 300

# How often (in seconds) to print out DAGs that have been running past
# their schedule_interval or catchup
print_stats_interval = 30

# The number of DAGs to parse per scheduler loop
# Keep this low to avoid high memory usage
max_dag_runs_to_query_in_scheduler = 100

# Whether the scheduler should catch up for runs that never ran
# or for runs where the execution_date hasn't been reached yet
catchup_by_default = False

[elasticsearch]
# Elasticsearch host
host =

# Elasticsearch port
port =

# Format of the log_id, which is used to index the log in elasticsearch
log_id_template = {dag_id}-{task_id}-{execution_date}-{try_number}

# End of log line
end_of_log_mark = END_OF_LOG

[elasticsearch_write_stdout]
# Write stdout from tasks to elasticsearch
write_stdout = False

[kubernetes]
# The worker pod configuration
worker_pod_template_file =

# How often the worker should refresh the pod template
refresh_template =

# Namespace for airflow pods
namespace = default

# The name of the Kubernetes service account to use
kubernetes_connection_id =

# Git-sync credentials
git_ssh_key_secret_name =

[ kerberos ]
# Whether to enable kerberos
ccache = /tmp/airflow_krb5_ccache
# App principal
principal = airflow
# Path to keytab
keytab = /etc/airflow.keytab
# Include remote host
include_ip = True

[github_enterprise]
# The github endpoint for github enterprise
github_enterprise_endpoint =

[admin]
# UI to hide sensitive variable fields when set. Variables with these
# names will be displayed with ****** instead of the actual value
hide_sensitive_variable_fields = password,secret,passwd,authorization,api_key,apikey

[database]
# The maximum number of SQL statements to log when they exceed the threshold
max_sql_statements_to_log = 100

# Whether to show SQL statements
sqlalchemy_show_queries = False
