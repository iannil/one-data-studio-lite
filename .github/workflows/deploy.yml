name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build Images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Portal Image
        run: |
          docker build -t one-data-studio-portal:${{ github.sha }} \
            -f services/docker/Dockerfile.portal services/

      - name: Build Services Images
        run: |
          for service in nl2sql ai_cleaning metadata_sync data_api sensitive_detect audit_log; do
            echo "Building $service..."
            docker build -t one-data-studio-$service:${{ github.sha }} \
              -f services/docker/Dockerfile.service services/ || true
          done

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        if: env.DEPLOY_HOST != ''
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/one-data-studio-lite
            git pull origin master
            docker compose -f services/docker-compose.yml --env-file services/.env.production up -d --build

      - name: Health check
        run: |
          echo "Deployment completed. Manual verification required."
