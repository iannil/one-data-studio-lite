[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    p0: 最高优先级测试
    p1: 高优先级测试
    p2: 中优先级测试
    p3: 低优先级测试
    integration: 集成测试（需要外部服务）
filterwarnings =
    ignore::DeprecationWarning
addopts = -v --tb=short
