[pytest]
pythonpath = .
testpaths = services
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --cov=services
    --cov-report=term-missing
    --cov-report=html
    --asyncio-mode=auto
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    redis: Tests requiring Redis
    p0: P0 优先级测试 - 核心功能，必须通过
    p1: P1 优先级测试 - 重要功能
    p2: P2 优先级测试 - 一般功能
    p3: P3 优先级测试 - 边界/异常测试
    super_admin: 超级管理员 (SUP) 角色测试
    admin: 管理员 (ADM) 角色测试
    data_scientist: 数据科学家 (SCI) 角色测试
    analyst: 数据分析师 (ANA) 角色测试
    viewer: 查看者 (VW) 角色测试
    service_account: 服务账户 (SVC) 角色测试
    cross_role: 跨角色权限隔离测试
filterwarnings =
    ignore::DeprecationWarning
